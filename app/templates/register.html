{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center fade-in-up" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-5">
        <div class="card recipe-card p-5 border-0 shadow-lg" style="border-radius: 24px;">
            <div class="text-center mb-5">
                <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
                    <i class="bi bi-person-plus-fill" style="font-size: 2.5rem;"></i>
                </div>
                <h2 class="fw-bold text-dark">加入饗食譜</h2>
                <p class="text-muted">註冊帳號，開始收藏與分享你的美味秘方</p>
            </div>
            
            <form action="{{ url_for('auth.register_process') }}" method="POST">
                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary">顯示名稱</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="bi bi-person text-muted"></i></span>
                        <input type="text" name="username" class="form-control form-control-lg bg-light border-0 ps-2" required placeholder="例如：廚神阿明">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary">電子信箱</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="bi bi-envelope text-muted"></i></span>
                        <input type="email" name="email" class="form-control form-control-lg bg-light border-0 ps-2" required placeholder="name@example.com">
                    </div>
                </div>
                <div class="mb-5">
                    <label class="form-label fw-bold text-secondary">密碼</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" name="password" class="form-control form-control-lg bg-light border-0 ps-2" required placeholder="請輸入至少 6 位密碼">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill fw-bold shadow py-3 mb-4">註冊帳號</button>
            </form>
            <div class="text-center">
                <span class="text-secondary">已經有帳號了？</span> <a href="{{ url_for('auth.login_page') }}" class="text-primary text-decoration-none fw-bold ms-1">立即登入</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
